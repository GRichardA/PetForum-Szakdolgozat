openapi: 3.0.3
info:
  title: PetForum API
  version: 1.0.0
  description: |
    Minimal API surface for thesis contract verification.
    This spec documents the implemented JSON endpoints under /api/v1.
servers:
  - url: http://127.0.0.1:8000
    description: Local development
paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Health]
      responses:
        '200':
          description: Service health payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  database:
                    type: string
                    example: ok
                  storage:
                    type: string
                    example: writable
                required: [status, database, storage]
  /api/v1/events:
    get:
      summary: List events
      operationId: listEvents
      tags: [Events]
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventSummary'
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer
                        minimum: 0
                    required: [count]
                required: [data, meta]
  /api/v1/events/{eventId}:
    get:
      summary: Get event details
      operationId: getEvent
      tags: [Events]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/EventDetail'
                required: [data]
        '404':
          description: Event not found
components:
  schemas:
    CategoryRef:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
      required: [id, name, slug]
    UserRef:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true
      required: [id, name]
    CommentNode:
      type: object
      properties:
        id:
          type: integer
        body:
          type: string
        user:
          $ref: '#/components/schemas/UserRef'
        children:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              body:
                type: string
              user:
                $ref: '#/components/schemas/UserRef'
            required: [id, body, user]
      required: [id, body, user, children]
    EventSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        event_date:
          type: string
          nullable: true
          format: date-time
        location:
          type: string
        description:
          type: string
          nullable: true
        category:
          $ref: '#/components/schemas/CategoryRef'
        user:
          $ref: '#/components/schemas/UserRef'
      required: [id, title, event_date, location, description, category, user]
    EventDetail:
      allOf:
        - $ref: '#/components/schemas/EventSummary'
        - type: object
          properties:
            comments:
              type: array
              items:
                $ref: '#/components/schemas/CommentNode'
          required: [comments]
